<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System — Gravity Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<canvas id="stars-bg"></canvas>

<!-- Speed HUD -->
<div id="speed-hud">1x</div>
<div id="speed-controls">
  <button onclick="window.__sim?.speedDown()">&minus;</button>
  <button onclick="window.__sim?.togglePause()">&#9208;</button>
  <button onclick="window.__sim?.speedUp()">+</button>
</div>

<!-- Scene Switcher -->
<div id="scene-switcher">
  <button class="scene-btn active" data-scene="solar" title="Solar System [1]">&#x2609;</button>
  <button class="scene-btn" data-scene="stellar" title="Stellar Remnants [2]">&#x2726;</button>
  <button class="scene-btn" data-scene="exoplanets" title="TRAPPIST-1 [3]">&#x2727;</button>
  <button class="scene-btn" data-scene="blackholes" title="Black Holes [4]">&#x25C9;</button>
  <button class="scene-btn" data-scene="supergiants" title="Supergiant Stars [5]">&#x2605;</button>
  <button class="scene-btn" data-scene="neutrons" title="Neutron Stars [6]">&#x2299;</button>
  <button class="scene-btn" data-scene="galaxies" title="Galaxies [7]">&#x229B;</button>
  <button class="scene-btn" data-scene="whitedwarfs" title="White Dwarfs [8]">&#x25CB;</button>
</div>

<div class="space">
  <!-- Orbit trail canvas (behind planets) -->
  <canvas id="trail-canvas" width="1200" height="1200"></canvas>

  <!-- Sun -->
  <div class="sun" data-body="sun"></div>

  <!-- Planets (flat — no orbit wrappers) -->
  <div class="mercury" data-body="mercury"></div>
  <div class="venus" data-body="venus"></div>
  <div class="earth" data-body="earth"></div>
  <div class="mars" data-body="mars"></div>
  <div class="jupiter" data-body="jupiter">
    <div class="jupiter-rings"></div>
  </div>
  <div class="saturn" data-body="saturn">
    <div class="saturn-rings"></div>
  </div>
  <div class="uranus" data-body="uranus">
    <div class="uranus-rings"></div>
  </div>
  <div class="neptune" data-body="neptune">
    <div class="neptune-rings"></div>
  </div>
  <div class="pluto" data-body="pluto"></div>

  <!-- Moons / Satellites (flat siblings) -->
  <div class="satellite moon" data-body="moon"></div>
  <div class="satellite phobos" data-body="phobos"></div>
  <div class="satellite deimos" data-body="deimos"></div>
  <div class="satellite io" data-body="io"></div>
  <div class="satellite europa" data-body="europa"></div>
  <div class="satellite ganymede" data-body="ganymede"></div>
  <div class="satellite titan" data-body="titan"></div>
  <div class="satellite titania" data-body="titania"></div>
  <div class="satellite triton" data-body="triton"></div>
  <div class="satellite charon" data-body="charon"></div>

  <!-- Asteroid Belt (CSS-only, unchanged) -->
  <div class="asteroid-belt" data-name="asteroid-belt"></div>

  <!-- Tooltip -->
  <div id="planet-info">
    <div id="planet-content"></div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay"></div>

  <!-- Planet Data Modal -->
  <div id="planet-modal">
    <div class="modal-container">
      <div class="hologram-effect"></div>
      <div class="scanlines"></div>
      <button id="close-modal" class="close-btn">&#10005;</button>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
